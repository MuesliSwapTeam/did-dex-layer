name: CI

on:
  push:
  pull_request:

jobs:
  python-runtime-tests:
    name: Python runtime tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "cbor2<6" "pycardano>=0.19,<0.20" "fastapi>=0.101,<0.102" "uvicorn[standard]" \
            fastapi-cache2 slowapi peewee==3.17.0 pyjwt==2.8.0 cryptography==36.0.2 \
            pytest pytest-asyncio pytest-cov flask flask-cors ogmios fire blockfrost-python \
            "aiohttp[speedups]" async-lru gelidum orjson psutil click
          python -m pip install --no-deps "opshin==0.19.1"

      - name: Verify runtime imports
        run: python -c "import pycardano, fastapi, uvicorn, pytest, ogmios, opshin; print('runtime OK')"

      - name: Run Python tests
        env:
          PYTHONPATH: src
        run: python -m pytest src/tests/

  contract-compiler:
    name: OpShin compiler checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install compiler dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install vendor/pycardano-0.9.0-py3-none-any.whl
          python -m pip install "opshin==0.19.1" fire

      - name: Verify compiler imports
        run: python -c "import pycardano, opshin, fire; print('compiler OK')"

      - name: Compile contracts to a temporary directory
        env:
          PYTHONPATH: src
        run: |
          mkdir -p "$RUNNER_TEMP/contracts/orderbook" "$RUNNER_TEMP/contracts/free_mint" "$RUNNER_TEMP/contracts/did_nft"
          opshin build spending src/orderbook/on_chain/orderbook.py --recursion-limit 3000 -o "$RUNNER_TEMP/contracts/orderbook"
          opshin build minting src/orderbook/on_chain/free_mint.py -o "$RUNNER_TEMP/contracts/free_mint"
          opshin build minting src/auth_nft_minting_tool/onchain/did_nft.py '{"bytes":"00000000000000000000000000000000000000000000000000000000"}' -o "$RUNNER_TEMP/contracts/did_nft"

  frontend:
    name: Frontend tests and builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            src/did_dex_frontend/package-lock.json
            src/auth_nft_minting_tool/frontend/package-lock.json
            src/auth_nft_minting_tool/package-lock.json
            src/auth_nft_minting_tool/server/package-lock.json

      - name: Install DID DEX frontend
        working-directory: src/did_dex_frontend
        run: npm ci

      - name: Test DID DEX frontend
        working-directory: src/did_dex_frontend
        run: npm test

      - name: Build DID DEX frontend
        working-directory: src/did_dex_frontend
        run: npm run build

      - name: Install legacy minting frontend
        working-directory: src/auth_nft_minting_tool/frontend
        run: npm ci

      - name: Test legacy minting frontend
        working-directory: src/auth_nft_minting_tool/frontend
        run: CI=true npm test -- --watchAll=false

      - name: Build legacy minting frontend
        working-directory: src/auth_nft_minting_tool/frontend
        run: npm run build

  node-package-installs:
    name: Node package install checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - src/auth_nft_minting_tool
          - src/auth_nft_minting_tool/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install package
        working-directory: ${{ matrix.package }}
        run: npm ci
